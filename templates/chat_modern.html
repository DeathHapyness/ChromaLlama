<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ChromaLlama - Chat IA</title>
  
  <script defer src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  
  <style>
    :root {
      --surface: #121212;
      --surface-soft: #1e1e1e;
      --panel: #0a0a0a;
      --border: rgba(255, 255, 255, 0.08);
      --text: #ececec;
      --accent: #10a37f;
      --sidebar-width: 280px;
    }

    [x-cloak] { display: none !important; }

    body { 
      background-color: var(--surface); 
      color: var(--text); 
      font-family: 'Inter', sans-serif; 
      margin: 0;
      height: 100vh;
      overflow: hidden;
    }

    .app-container { display: flex; height: 100vh; width: 100vw; }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      height: 100%;
      transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .logo-circle {
      background: rgba(16, 163, 127, 0.15);
      border: 1px solid rgba(16, 163, 127, 0.3);
      border-radius: 9999px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .message-user { background: var(--surface-soft); border-radius: 1.25rem; padding: 0.75rem 1.25rem; max-width: 85%; }
    
    @media (min-width: 769px) {
      .sidebar-open .main-content { margin-left: var(--sidebar-width); }
    }
    
    .fade-in { animation: fadeIn 0.5s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body x-data="chatApp()" x-init="init()" :class="{ 'sidebar-open': sidebarOpen }">

  <div class="app-container">
    
    <aside class="fixed left-0 top-0 bottom-0 z-50 w-[var(--sidebar-width)] bg-[var(--panel)] border-r border-[var(--border)] flex flex-col transition-transform duration-300"
           :style="sidebarOpen ? 'transform: translateX(0)' : 'transform: translateX(-100%)'" cloak>
      
      <div class="p-4 flex flex-col h-full">
        <div class="flex items-center gap-3 mb-6 px-2">
            <div class="w-9 h-9 logo-circle">
                <i data-lucide="sparkles" class="w-5 h-5 text-green-500"></i>
            </div>
            <span class="font-bold text-base tracking-tight text-white">ChromaLlama</span>
        </div>

        <div class="relative mb-4">
            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-zinc-500"></i>
            <input x-model="searchQuery" type="text" placeholder="Buscar conversas..." 
                   class="w-full bg-zinc-900 border border-[var(--border)] rounded-lg py-2 pl-9 pr-3 text-xs focus:outline-none focus:border-zinc-700">
        </div>

        <button @click="newChat()" class="flex items-center justify-center gap-2 w-full p-2.5 rounded-lg border border-[var(--border)] text-xs font-medium hover:bg-zinc-800 transition mb-4">
          <i data-lucide="plus" class="w-4 h-4"></i> Novo Chat
        </button>

        <div class="flex-1 overflow-y-auto space-y-1 pr-1">
          <template x-for="chat in filteredChats" :key="chat.id">
            <div @click="selectChat(chat.id)" 
                 class="group flex items-center justify-between p-2.5 rounded-lg cursor-pointer text-sm hover:bg-zinc-900 transition"
                 :class="currentChatId === chat.id ? 'bg-zinc-800 text-white' : 'text-zinc-500'">
              <div class="flex items-center gap-2 truncate">
                <i data-lucide="message-square" class="w-3.5 h-3.5"></i>
                <span class="truncate" x-text="chat.title"></span>
              </div>
              <button @click.stop="deleteChat(chat.id)" class="opacity-0 group-hover:opacity-100 p-1 hover:text-red-400">
                <i data-lucide="trash-2" class="w-3 h-3"></i>
              </button>
            </div>
          </template>
        </div>

        <div class="mt-auto pt-4 border-t border-[var(--border)]">
            <button @click="settingsOpen = true" class="flex items-center gap-3 w-full p-3 rounded-lg text-zinc-400 hover:bg-zinc-800 hover:text-white transition">
                <i data-lucide="settings" class="w-4 h-4"></i>
                <span class="text-sm font-medium">Configurações</span>
            </button>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="flex-shrink-0 h-14 border-b border-[var(--border)] px-6 flex items-center justify-between bg-[var(--surface)]">
        <button @click="sidebarOpen = !sidebarOpen" class="text-zinc-400 hover:text-white transition">
          <i data-lucide="menu" class="w-5 h-5"></i>
        </button>
        <span class="text-xs font-semibold text-zinc-500 uppercase tracking-widest" x-text="currentChatTitle() || 'Chat'"></span>
        <div class="w-5"></div>
      </header>

      <div class="flex-1 overflow-y-auto relative" x-ref="chatWindow">
        
        <template x-if="messages.length === 0">
            <div class="absolute inset-0 flex flex-col items-center justify-center text-center p-6 fade-in">
                <div class="w-16 h-16 logo-circle mb-4">
                    <i data-lucide="sparkles" class="w-8 h-8 text-green-500"></i>
                </div>
                <h2 class="text-2xl font-bold text-white mb-2" x-text="getGreeting()"></h2>
                <p class="text-zinc-500 max-w-xs text-sm">Como posso auxiliar nos seus projetos hoje?</p>
            </div>
        </template>

        <div class="max-w-3xl mx-auto px-6 py-8">
          <template x-for="msg in messages" :key="msg.id">
            <div class="mb-8 flex" :class="msg.role === 'user' ? 'justify-end' : 'justify-start'">
              <div :class="msg.role === 'user' ? 'message-user' : 'message-ai'">
                <template x-if="msg.role === 'ai'">
                    <div class="flex items-center gap-2 mb-3 text-zinc-400">
                        <i data-lucide="bot" class="w-4 h-4 text-green-500"></i>
                        <span class="text-[10px] font-bold uppercase tracking-tighter">ChromaLlama</span>
                    </div>
                </template>
                <div class="text-[14px] leading-relaxed prose prose-invert max-w-none" x-html="msg.content"></div>
              </div>
            </div>
          </template>

          <template x-if="isLoading">
            <div class="flex gap-2 items-center text-zinc-500 text-xs animate-pulse">
                <div class="w-1 h-1 bg-zinc-500 rounded-full"></div>
                Processando...
            </div>
          </template>
          
          <div x-ref="chatBottom" class="h-4"></div>
        </div>
      </div>

      <footer class="flex-shrink-0 bg-[var(--surface)] p-4 md:p-6">
        <div class="max-w-3xl mx-auto">
          <form @submit.prevent="sendMessage()" class="relative">
            <input x-model="userInput" type="text" placeholder="Envie uma mensagem..." :disabled="isLoading"
                   class="w-full bg-zinc-900 border border-[var(--border)] rounded-xl py-4 pl-5 pr-14 focus:outline-none focus:border-green-600 transition-all text-sm">
            <button type="submit" :disabled="isLoading || !userInput.trim()" 
                    class="absolute right-2.5 top-1/2 -translate-y-1/2 p-2 rounded-lg bg-green-600 text-black hover:bg-green-500">
              <i data-lucide="arrow-up" class="w-4 h-4"></i>
            </button>
          </form>
        </div>
      </footer>
    </main>

    <aside class="fixed right-0 top-0 bottom-0 z-[60] w-80 bg-[var(--panel)] border-l border-[var(--border)] shadow-2xl transition-transform duration-300"
           x-show="settingsOpen"
           x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0"
           x-transition:leave-start="translate-x-0" x-transition:leave-end="translate-x-full" cloak>
      <div class="p-6">
        <div class="flex items-center justify-between mb-8">
          <h2 class="font-bold text-lg">Configurações</h2>
          <button @click="settingsOpen = false" class="text-zinc-500 hover:text-white"><i data-lucide="x"></i></button>
        </div>
        <div class="space-y-6">
            <button @click="messages = []" class="w-full flex items-center gap-2 p-3 bg-zinc-800 text-white rounded-lg text-sm border border-[var(--border)]">
                <i data-lucide="eraser" class="w-4 h-4"></i> Limpar tela atual
            </button>
        </div>
      </div>
    </aside>
  </div>

  <script>
    function chatApp() {
      return {
        sidebarOpen: window.innerWidth > 1024,
        settingsOpen: false,
        searchQuery: '',
        currentChatId: null,
        userInput: '',
        isLoading: false,
        chats: [],
        messages: [],

        init() {
          this.loadChats(); 
          if (this.chats.length === 0) this.newChat();
          
          this.$nextTick(() => lucide.createIcons());

          this.$watch('messages', () => {
              this.$nextTick(() => lucide.createIcons());
              this.scrollToBottom();
          });
        },

        getGreeting() {
            const hour = new Date().getHours();
            if (hour >= 5 && hour < 12) return "Bom dia, mestre.";
            if (hour >= 12 && hour < 18) return "Boa tarde, mestre.";
            return "Boa noite, mestre.";
        },

        get filteredChats() {
            if (!this.searchQuery) return this.chats;
            return this.chats.filter(c => c.title.toLowerCase().includes(this.searchQuery.toLowerCase()));
        },

        currentChatTitle() {
          return this.chats.find(c => c.id === this.currentChatId)?.title;
        },

        loadChats() {
          const savedChats = localStorage.getItem('cl_sessions_v8');
          if (savedChats) this.chats = JSON.parse(savedChats);
          this.currentChatId = localStorage.getItem('cl_active_id_v8') || (this.chats[0]?.id);
        },

        saveChats() {
          localStorage.setItem('cl_sessions_v8', JSON.stringify(this.chats));
          localStorage.setItem('cl_active_id_v8', this.currentChatId);
        },

        newChat() {
          const id = Date.now().toString();
          this.chats.unshift({ id, title: 'Nova Conversa' });
          this.currentChatId = id;
          this.messages = [];
          this.saveChats();
        },

        selectChat(id) {
          this.currentChatId = id;
          this.messages = [];
          this.saveChats();
          if (window.innerWidth < 768) this.sidebarOpen = false;
        },

        deleteChat(id) {
          this.chats = this.chats.filter(c => c.id !== id);
          if (this.currentChatId === id) this.newChat();
          this.saveChats();
        },

        scrollToBottom() {
          this.$nextTick(() => {
            if (this.$refs.chatBottom) {
                this.$refs.chatBottom.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }
          });
        },

        async sendMessage() {
          if (!this.userInput.trim()) return;
          const query = this.userInput;
          this.messages.push({ id: Date.now(), role: 'user', content: query });
          
          if (this.messages.length === 1) {
              const chat = this.chats.find(c => c.id === this.currentChatId);
              if (chat) chat.title = query.substring(0, 20);
          }

          this.userInput = '';
          this.isLoading = true;

          try {
            const res = await fetch('/chat', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ query: query, session_id: this.currentChatId })
            });
            const data = await res.json();
            this.messages.push({ id: Date.now() + 1, role: 'ai', content: data.answer });
          } catch (e) {
            this.messages.push({ id: Date.now() + 1, role: 'ai', content: 'Erro de comunicação.' });
          } finally {
            this.isLoading = false;
            this.saveChats();
          }
        }
      }
    }
  </script>
</body>
</html>
